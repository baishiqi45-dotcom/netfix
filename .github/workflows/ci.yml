name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-14
            python-version: "3.9"
          - os: macos-15
            python-version: "3.11"
          - os: macos-latest
            python-version: "3.12"
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Syntax check
        run: |
          python3 -m py_compile netfix/*.py
          python3 scripts/release_audit.py --scope workspace --root .

      - name: Install test runner
        run: python3 -m pip install --upgrade pytest

      - name: CLI smoke test
        run: |
          python3 netfix.py --help
          python3 netfix.py triage --json --timeout 8

      - name: API / Web smoke test
        run: |
          python3 netfix.py server --host 127.0.0.1 --port 8766 --timeout 10 &
          SERVER_PID=$!
          sleep 2
          curl -fs http://127.0.0.1:8766/health
          curl -fs http://127.0.0.1:8766/ | head -1
          kill $SERVER_PID || true

      - name: MCP smoke test
        run: |
          (cd /tmp && echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"smoke","version":"1.0"}}}' | python3 "$GITHUB_WORKSPACE/netfix/mcp_server.py" >/dev/null)

      - name: Run unit tests
        run: python3 -m pytest -q

  release-gate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test runner
        run: python3 -m pip install --upgrade pytest

      - name: Source and marketing release gate
        run: |
          python3 scripts/release_audit.py --scope workspace --root .
          python3 scripts/marketing_claims_check.py --json
          python3 scripts/source_export.py --zip --json

      - name: MCP installer dry-run gate
        run: bash scripts/install_mcp.sh --all --dry-run

  app:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-14, macos-15]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer || true

      - name: Build SwiftUI menu bar app
        run: |
          cd gui/macos
          swift build

      - name: Build and audit local app bundle
        run: |
          cd gui/macos
          ./build_app.sh
          python3 ../../scripts/release_audit.py --scope bundle --root .build/Netfix.app
